<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: sans-serif; font-size: 13px; padding: 12px; }
    h2 { font-size: 15px; margin: 0 0 12px; }
    .project { padding: 8px; border: 1px solid #e5e7eb; border-radius: 6px; margin-bottom: 8px; cursor: pointer; }
    .project:hover { background: #f9fafb; }
    .project-name { font-weight: 500; }
    .project-meta { color: #6b7280; font-size: 11px; margin-top: 2px; }
    .empty { color: #9ca3af; text-align: center; padding: 24px 0; }
    #clear-btn { margin-top: 12px; width: 100%; padding: 7px; background: none; border: 1px solid #fca5a5; color: #ef4444; border-radius: 6px; font-size: 12px; cursor: pointer; }
    #clear-btn:hover { background: #fef2f2; }
    #confirm-bar { display: none; margin-top: 8px; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 6px; padding: 10px 12px; }
    #confirm-bar p { margin: 0 0 8px; font-size: 12px; color: #7f1d1d; }
    #confirm-bar .actions { display: flex; gap: 8px; }
    #confirm-bar .actions button { flex: 1; padding: 5px; border-radius: 5px; font-size: 12px; cursor: pointer; border: none; }
    #confirm-yes { background: #ef4444; color: white; }
    #confirm-yes:hover { background: #dc2626; }
    #confirm-no { background: #e5e7eb; color: #374151; }
    #confirm-no:hover { background: #d1d5db; }
    #trace-section { margin-top: 14px; border-top: 1px solid #e5e7eb; padding-top: 10px; display: none; }
    #trace-section h3 { font-size: 11px; color: #6b7280; margin: 0 0 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
    #trace-query { font-size: 12px; color: #111; margin-bottom: 6px; }
    .trace-row { display: flex; align-items: flex-start; gap: 6px; padding: 5px 7px; border-radius: 5px; margin-bottom: 4px; font-size: 11px; }
    .trace-row.pass { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .trace-row.fail { background: #fef2f2; border: 1px solid #fecaca; }
    .trace-badge { font-size: 10px; margin-top: 1px; flex-shrink: 0; }
    .trace-name { font-weight: 600; color: #111; }
    .trace-detail { color: #6b7280; margin-top: 1px; }
  </style>
</head>
<body>
  <h2>🫏 Donkey</h2>
  <div id="projects"></div>
  <button id="clear-btn">Delete all memory</button>
  <div id="confirm-bar">
    <p>This will permanently delete all saved memories and cannot be undone.</p>
    <div class="actions">
      <button id="confirm-yes">Yes, delete everything</button>
      <button id="confirm-no">Cancel</button>
    </div>
  </div>
  <div id="trace-section">
    <h3>Last retrieval</h3>
    <div id="trace-query"></div>
    <div id="trace-rows"></div>
  </div>
  <script src="../memory/db.js"></script>
  <script src="popup.js"></script>
</body>
</html>
